name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 9 */5 * *'  # Every 5 days at 09:00 UTC (7-day limit에 2일 여유)
  workflow_dispatch:        # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase DB
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: sb_publishable_y5l1cAZXoAj8xaSVXUkBfw_Pk9pxb6H" \
            -H "Authorization: Bearer sb_publishable_y5l1cAZXoAj8xaSVXUkBfw_Pk9pxb6H" \
            "https://vhnourjddnlslgabrasb.supabase.co/rest/v1/inquiries?select=id&limit=1")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "206" ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "OK — Supabase is active"
